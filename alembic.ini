# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow array encoding of non-string
# values in the version locations
# version_locations =

# version table name; default is 'alembic_version'
# version_table = alembic_version

# format using "ones" or "zeroes" for the prefix
# of the number of elements in the version number
# representation
# version_path_separator = :

# set to 'true' to write the migration files with UTF-8 encoding
# output_encoding = utf-8

# This is overridden by env.py using DATABASE_URL environment variable
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/bruno_db

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
